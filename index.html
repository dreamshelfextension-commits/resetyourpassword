<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Dreamshelf</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #7eb8f7;
      --accent-glow: rgba(126,184,247,0.25);
      --text: #e8edf5;
      --muted: rgba(232,237,245,0.5);
      --error: #f87171;
      --success: #6ee7b7;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }
    .nebula-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a3a6e, transparent 70%);
      top: -150px; right: -100px;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .nebula-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #0d2a4a, transparent 70%);
      bottom: -100px; left: -120px;
      animation: drift 22s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem 2.5rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px var(--border), 0 32px 64px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(28px);
      animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 1.75rem;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(126,184,247,0.2), transparent 70%);
      border: 1px solid rgba(126,184,247,0.3);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 32px var(--accent-glow);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 32px var(--accent-glow); }
      50%       { box-shadow: 0 0 52px rgba(126,184,247,0.4); }
    }
    .icon-wrap svg {
      width: 30px; height: 30px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      opacity: 0.8;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.85rem;
      background: linear-gradient(160deg, #ffffff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    /* ── Form ── */
    .form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }

    input[type="password"] {
      width: 100%;
      padding: 0.85rem 2.75rem 0.85rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus {
      border-color: rgba(126,184,247,0.5);
      box-shadow: 0 0 0 3px rgba(126,184,247,0.1);
    }
    input[type="password"]::placeholder { color: rgba(232,237,245,0.25); }

    .toggle-pw {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--muted);
      display: flex;
      align-items: center;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .toggle-pw:hover { opacity: 1; }
    .toggle-pw svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* strength bar */
    .strength-bar {
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
      min-height: 1em;
    }

    .btn {
      margin-top: 0.5rem;
      padding: 0.9rem;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(126,184,247,0.18), rgba(126,184,247,0.08));
      border: 1px solid rgba(126,184,247,0.35);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      width: 100%;
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(126,184,247,0.28), rgba(126,184,247,0.14));
      border-color: rgba(126,184,247,0.6);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Message states ── */
    .msg {
      font-size: 0.85rem;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      display: none;
      text-align: left;
      line-height: 1.5;
    }
    .msg.error {
      display: block;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--error);
    }
    .msg.success {
      display: block;
      background: rgba(110,231,183,0.08);
      border: 1px solid rgba(110,231,183,0.25);
      color: var(--success);
    }

    /* ── Invalid token state ── */
    .invalid-state { display: none; }
    .invalid-state.visible { display: block; }
    .form-state { display: block; }
    .form-state.hidden { display: none; }

    .divider {
      margin: 1.5rem 0 1.25rem;
      border: none;
      border-top: 1px solid var(--border);
    }
    .footnote {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<div class="page">
  <div class="card">
    <div class="icon-wrap">
      <!-- lock icon -->
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="brand">Dreamshelf</div>

    <!-- Invalid / expired token -->
    <div class="invalid-state" id="invalidState">
      <h1>Link expired.</h1>
      <p class="subtitle">This password reset link is invalid or has already been used. Please request a new one from the extension.</p>
    </div>

    <!-- Form -->
    <div class="form-state" id="formState">
      <h1>New password.</h1>
      <p class="subtitle">Choose a strong password for your Dreamshelf account.</p>

      <div class="form" id="resetForm">
        <div class="msg" id="msg"></div>

        <div class="field">
          <label>New Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter new password" autocomplete="new-password"/>
            <button class="toggle-pw" type="button" onclick="togglePw('password', this)" tabindex="-1">
              <svg id="eyeIcon1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password"/>
            <button class="toggle-pw" type="button" onclick="togglePw('confirm', this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn" id="submitBtn" onclick="handleReset()">Update Password</button>
      </div>
    </div>

    <hr class="divider"/>
    <p class="footnote" id="footnote">After updating, close this tab and sign in to the extension.</p>
  </div>
</div>

<script>
  // ── Replace these with your actual Supabase project values ──
  const SUPABASE_URL = 'https://uuudyovsvgrrhpssgiuk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dWR5b3Zzdmdycmhwc3NnaXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzYxNTEsImV4cCI6MjA5MTIxMjE1MX0.IHQsMdFTDhtkrEegkrX59x-5Y2pSWAmELV2yxTfHsbM';

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Parse hash tokens from URL
  function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    return {
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token'),
      type: params.get('type')
    };
  }

  const { access_token, refresh_token, type } = parseHash();

  // Validate it's a recovery link
  if (!access_token || type !== 'recovery') {
    document.getElementById('formState').classList.add('hidden');
    document.getElementById('invalidState').classList.add('visible');
  } else {
    // Set the session so updateUser works
    client.auth.setSession({ access_token, refresh_token });
  }

  // Password strength
  document.getElementById('password').addEventListener('input', function () {
    const val = this.value;
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: '#f87171',     text: 'Weak' },
      { pct: '50%',  color: '#fb923c',     text: 'Fair' },
      { pct: '75%',  color: '#facc15',     text: 'Good' },
      { pct: '100%', color: '#6ee7b7',     text: 'Strong' },
    ];
    fill.style.width = levels[score].pct;
    fill.style.background = levels[score].color;
    label.textContent = levels[score].text;
    label.style.color = levels[score].color;
  });

  // Toggle password visibility
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.style.opacity = input.type === 'text' ? '1' : '0.6';
  }

  // Show message
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // Handle reset
  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('submitBtn');

    if (!password || password.length < 8) {
      return showMsg('Password must be at least 8 characters.', 'error');
    }
    if (password !== confirm) {
      return showMsg('Passwords do not match.', 'error');
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await client.auth.updateUser({ password });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      showMsg('Password updated! Close this tab and sign in to the extension.', 'success');
      btn.style.display = 'none';
      document.getElementById('footnote').style.display = 'none';
      document.getElementById('password').disabled = true;
      document.getElementById('confirm').disabled = true;
    }
  }
</script>
</body>
</html>
